<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Mad Libs</title>
    <style>
      :root {
        --bg: #f6efe4;
        --panel: rgba(255, 251, 245, 0.92);
        --ink: #1f1a17;
        --accent: #bd5b35;
        --accent-dark: #8f4024;
        --blank: #f3d8b8;
        --shadow: 0 20px 50px rgba(87, 48, 27, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(255, 220, 180, 0.8), transparent 32%),
          radial-gradient(circle at bottom right, rgba(205, 118, 78, 0.22), transparent 28%),
          linear-gradient(160deg, #f8f2e8 0%, #f1e5d1 55%, #ecd7bc 100%);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      .card {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid rgba(108, 67, 42, 0.12);
        border-radius: 28px;
        padding: 32px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      p.lede {
        margin: 0 0 28px;
        font-size: 1.05rem;
        line-height: 1.6;
        max-width: 55ch;
      }

      .story {
        margin: 0;
        padding: 24px;
        border-radius: 22px;
        background: rgba(255, 247, 236, 0.9);
        font-size: clamp(1.35rem, 3vw, 2rem);
        line-height: 1.65;
      }

      .blank {
        display: inline-block;
        margin: 0 0.16em;
        padding: 0.06em 0.42em;
        border-radius: 999px;
        background: var(--blank);
        color: var(--accent-dark);
        font-weight: 700;
        transform: translateY(-0.03em);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-top: 24px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 14px 20px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(189, 91, 53, 0.28);
        transition: transform 140ms ease, background 140ms ease;
      }

      button:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(1px);
      }

      .note {
        font-size: 0.98rem;
        opacity: 0.82;
      }

      @media (max-width: 640px) {
        .card {
          padding: 24px;
          border-radius: 24px;
        }

        .story {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Mini Mad Libs</h1>
      <p class="lede">
        Click the button to remix the sentence with words pulled from preset lists.
      </p>

      <p class="story" id="story" aria-live="polite"></p>

      <div class="controls">
        <button id="generate" type="button">Generate New Sentence</button>
        <span class="note">Each blank is filled from its own word list.</span>
      </div>
    </main>

    <script>
      const wordLists = {
        adjective: ["wobbly", "glittery", "mysterious", "tiny", "dramatic", "soggy"],
        noun: ["raccoon", "trombone", "cupcake", "volcano", "backpack", "hedgehog"],
        verbPast: ["juggled", "borrowed", "launched", "tickled", "admired", "confused"],
        place: ["at the library", "on the moon", "behind the diner", "inside a submarine", "near Detroit", "under the porch"],
        adverb: ["wildly", "gracefully", "suspiciously", "cheerfully", "awkwardly", "boldly"]
      };

      const template = [
        "The",
        { key: "adjective" },
        { key: "noun" },
        { key: "verbPast" },
        { key: "place" },
        "and",
        { key: "adverb" },
        "asked for a second breakfast."
      ];

      function pickRandom(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function renderSentence() {
        const story = document.getElementById("story");

        story.innerHTML = template
          .map((part) => {
            if (typeof part === "string") {
              return part;
            }

            const word = pickRandom(wordLists[part.key]);
            return `<span class="blank">${word}</span>`;
          })
          .join(" ");
      }

      document.getElementById("generate").addEventListener("click", renderSentence);
      renderSentence();
    </script>
  </body>
</html>
